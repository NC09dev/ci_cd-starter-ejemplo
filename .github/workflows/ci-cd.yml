# =====================================================
# Pipeline CI/CD - GitHub Actions
# =====================================================
# Este archivo se ejecuta AUTOMATICAMENTE cada vez que
# alguien hace push o abre un Pull Request.
#
# Cada "job" es una estacion de la fabrica.
# Si una estacion falla, las siguientes NO se ejecutan
# y el codigo NUNCA llega a produccion.
# =====================================================

name: CI/CD - La Fabrica de Software

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ============================================
  # JOB 1: Lint - "revisamos el estilo del codigo"
  # ============================================
  lint:
    name: 1️⃣ Lint - Estilo de codigo
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar lint
        run: npm run lint

  # ============================================
  # JOB 2: Tests - "el codigo hace lo que prometio"
  # ============================================
  test:
    name: 2️⃣ Tests automaticos
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar tests
        run: npm test

  # ============================================
  # JOB 3: Seguridad - "no hay secretos ni vulnerabilidades"
  # ============================================
  security:
    name: 3️⃣ Escaneo de seguridad (DevSecOps)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Buscar secretos expuestos (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================
  # JOB 4: Build - "empacamos la app en un contenedor"
  # ============================================
  build:
    name: 4️⃣ Build - Construir imagen Docker
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker (sin publicar)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: devops-clase:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 5: Deploy - "publicamos la nueva version"
  # ============================================
  deploy:
    name: 5️⃣ Deploy a produccion
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Mensaje de despliegue
        run: |
          echo "🚀 Desplegando version ${{ github.sha }} a produccion"
          echo "En una empresa real, aqui llamariamos a Render, Vercel,"
          echo "AWS, Kubernetes, etc. Para la clase, este paso simbolico"
          echo "demuestra el ULTIMO eslabon de la cadena."
